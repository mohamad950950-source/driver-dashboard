{% extends "base.html" %}
{% block content %}
<style>
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:480px;margin:0 auto 1rem}
.pb{background:var(--bg-card);border-radius:var(--radius-lg);padding:.85rem .5rem;text-align:center;cursor:pointer;transition:all .12s;text-decoration:none;color:var(--text-body);font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid transparent}
.pb:hover{background:var(--bg-raised)}
.pb .pb-l{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.pb .pb-l svg{display:block}
.pb .pb-n{font-size:.7rem;font-weight:500;color:var(--text-muted);letter-spacing:-.01em}
.pb.connected{border-color:var(--green);background:rgba(48,209,88,0.06)}
.pb.connected .pb-n{color:var(--green)}
.pb.q{border-color:var(--border)}
.qf{background:var(--bg-card);border-radius:var(--radius-lg);padding:1rem;margin:0 auto 1rem;max-width:480px;display:none}
.qf .qr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.qf .qf-w{grid-column:1/-1}
.qf input,.qf select{background:var(--bg-input);border:1px solid var(--border);color:var(--text-body);padding:9px 11px;border-radius:var(--radius);font-family:var(--font);font-size:.78rem;width:100%;outline:none}
.qf input:focus,.qf select:focus{border-color:var(--accent)}
.qf .qa{display:flex;gap:8px}
.qf .qa button{flex:1;padding:9px;border-radius:var(--radius-pill);border:none;cursor:pointer;font-weight:500;font-size:.76rem;font-family:var(--font)}
.tc{text-align:center;margin-bottom:1.1rem}
.tc .tv{font-size:1.7rem;font-weight:700;color:var(--text-title);letter-spacing:-.03em}
.tc .ts{font-size:.7rem;color:var(--text-faint);margin-top:2px}
.tc .tb{display:flex;gap:12px;justify-content:center;margin-top:6px;font-size:.68rem;flex-wrap:wrap}
.tc .tb span{color:var(--text-muted)}
@media(max-width:450px){.ag{grid-template-columns:repeat(3,1fr);gap:6px}.qf .qr{grid-template-columns:1fr}}
</style>

<div class="tc">
  <div class="tv" id="tv">0 ج.م</div>
  <div class="ts" id="ts">0 مشاوير اليوم</div>
  <div class="tb" id="tbrk"></div>
</div>

<div class="ag" id="ag"></div>

<div class="qf" id="qfFuel">
  <div class="qr">
    <input type="number" id="fO" placeholder="العداد (كم)">
    <input type="number" id="fL" step="0.1" placeholder="اللتر">
    <input type="number" id="fC" step="0.01" placeholder="التكلفة ج.م" class="qf-w">
  </div>
  <div class="qa">
    <button style="background:var(--bg-raised);color:var(--text-faint)" onclick="cf()">الغاء</button>
    <button style="background:var(--accent);color:#fff;font-weight:600" onclick="sf()">حفظ</button>
  </div>
</div>

<div class="qf" id="qfMaint">
  <div class="qr">
    <select id="mT">
      <option value="تغيير زيت">تغيير زيت</option>
      <option value="فرامل">فرامل</option>
      <option value="تكييف">تكييف</option>
      <option value="إطارات">إطارات</option>
      <option value="أخرى">أخرى</option>
    </select>
    <input type="number" id="mC" step="0.01" placeholder="التكلفة ج.م">
    <input type="text" id="mS" placeholder="الورشة" class="qf-w">
  </div>
  <div class="qa">
    <button style="background:var(--bg-raised);color:var(--text-faint)" onclick="cm()">الغاء</button>
    <button style="background:var(--accent);color:#fff;font-weight:600" onclick="sm()">حفظ</button>
  </div>
</div>

<div class="qf" id="qfTrip">
  <div class="qr">
    <select id="tP">
      <option value="uber">Uber</option>
      <option value="didi">Didi</option>
      <option value="indrive">InDrive</option>
      <option value="personal">VIP Trip</option>
    </select>
    <input type="text" id="tF" inputmode="decimal" placeholder="المبلغ">
    <input type="text" id="tD" placeholder="كم (اختياري)" class="qf-w">
  </div>
  <div class="qa">
    <button style="background:var(--bg-raised);color:var(--text-faint)" onclick="ct()">الغاء</button>
    <button style="background:var(--accent);color:#fff;font-weight:600" onclick="st()">حفظ</button>
  </div>
</div>

<script>
const PF = {uber:{n:'Uber',c:'#000000',l:'<svg width="24" height="24" viewBox="0 0 24 24"><rect x="0" y="0" width="24" height="24" rx="5" fill="#000"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-weight="700" font-size="6.5" font-family="Arial,sans-serif">Uber</text></svg>'},didi:{n:'Didi',c:'#FF6600',l:'<svg width="24" height="24" viewBox="0 0 24 24"><rect x="0" y="0" width="24" height="24" rx="6" fill="#FF6600"/><path d="M9 8h3a4 4 0 010 8H9V8zm1.5 1.5v5h1.5a2.5 2.5 0 000-5z" fill="#fff"/></svg>'},indrive:{n:'InDrive',c:'#00B14F',l:'<svg width="24" height="24" viewBox="0 0 24 24"><rect x="0" y="0" width="24" height="24" rx="6" fill="#00B14F"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-weight="700" font-size="12" font-family="Arial,sans-serif">in</text></svg>'},personal:{n:'VIP Trip',c:'#0071e3',l:'<svg width="24" height="24" viewBox="0 0 24 24"><rect x="0" y="0" width="24" height="24" rx="6" fill="#0071e3"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-weight="700" font-size="8" font-family="Arial,sans-serif">VIP</text></svg>'}};

function cf(){document.getElementById('qfFuel').style.display='none';document.querySelector('[data-form="fuel"]')?.classList.remove('active')}
function cm(){document.getElementById('qfMaint').style.display='none';document.querySelector('[data-form="maint"]')?.classList.remove('active')}
function ct(){document.getElementById('qfTrip').style.display='none';document.querySelector('[data-form="trip"]')?.classList.remove('active')}
function sf(){const o=+document.getElementById('fO').value,l=+document.getElementById('fL').value,c=+document.getElementById('fC').value;if(!o||!l||!c){toast('ادخل كل البيانات','var(--red)');return}api('/api/fuel',{method:'POST',body:JSON.stringify({date:new Date().toISOString().split('T')[0],odometer_km:o,liters:l,total_cost:c,notes:''})}).then(r=>{toast('تم');cf();document.getElementById('fO').value=document.getElementById('fL').value=document.getElementById('fC').value=''}).catch(e=>toast(e.message,'var(--red)'))}
function sm(){const t=document.getElementById('mT').value,c=+document.getElementById('mC').value;if(!c){toast('ادخل التكلفة','var(--red)');return}api('/api/maintenance',{method:'POST',body:JSON.stringify({date:new Date().toISOString().split('T')[0],type:t,cost:c,shop_name:document.getElementById('mS').value,notes:'',description:t})}).then(r=>{toast('تم');cm();document.getElementById('mC').value=document.getElementById('mS').value=''}).catch(e=>toast(e.message,'var(--red)'))}
function st(){const p=document.getElementById('tP').value,m=document.getElementById('tF').value.replace(/[٠-٩۰-۹]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[٫, ]/g,''),f=parseFloat(m)||0;if(!f){toast('ادخل المبلغ','var(--red)');return}api('/api/trips',{method:'POST',body:JSON.stringify({platform:p,date:new Date().toISOString().split('T')[0],fare:f,tip:0,commission:0,distance_km:parseFloat(document.getElementById('tD').value)||0,notes:''})}).then(r=>{toast('تم');ct();document.getElementById('tF').value=document.getElementById('tD').value=''}).catch(e=>toast(e.message,'var(--red)'))}
function sfuel(){cf();cm();ct();document.getElementById('qfFuel').style.display='block';document.querySelector('[data-form="fuel"]')?.classList.add('active')}
function smaint(){cf();cm();ct();document.getElementById('qfMaint').style.display='block';document.querySelector('[data-form="maint"]')?.classList.add('active')}
function strips(){cf();cm();ct();document.getElementById('qfTrip').style.display='block';document.querySelector('[data-form="trip"]')?.classList.add('active')}
function oc(pid){api('/api/connect-platform/'+pid,{method:'POST'}).catch(()=>{});window.open('/api/oauth/'+pid+'/authorize','_blank','width=500,height=700');setTimeout(ld,3000)}

async function ld(){
  try{
    const td=await api('/api/driver-summary?period=today');
    const net=td.total_net_revenue||0,tc=td.revenue.reduce((a,r)=>a+r.trip_count,0);
    document.getElementById('tv').textContent=fmt(net)+' ج.م';
    document.getElementById('ts').textContent=tc+' مشاوير اليوم';
    const bk=document.getElementById('tbrk');bk.innerHTML='';
    (td.revenue||[]).forEach(r=>{bk.innerHTML+='<span style="color:'+(PF[r.platform]?.c||'var(--text-muted)')+'" onclick="window.location=\'/revenue?platform='+r.platform+'\'" style="cursor:pointer">'+(PF[r.platform]?.n||r.platform)+': '+fmt(r.net_revenue||0)+'</span>'})
  }catch(e){}
  let cp = {};
  try{const ca=await api('/api/connected-accounts');ca.accounts.forEach(a=>{cp[a.platform]=a})}catch(e){}
  const g=document.getElementById('ag');
  const btns=[
    {id:'uber',l:PF.uber.l,c:'#000000',n:'Uber',d:'Connect',on:'oc',ch:cp['uber']?.status==='connected'},
    {id:'didi',l:PF.didi.l,c:'#FF6600',n:'Didi',d:'Connect',on:'oc',ch:cp['didi']?.status==='connected'},
    {id:'indrive',l:PF.indrive.l,c:'#00B14F',n:'InDrive',d:'Connect',on:'oc',ch:cp['indrive']?.status==='connected'},
    {id:'trip',l:'<svg width="22" height="22" viewBox="0 0 24 24"><rect x="1" y="1" width="22" height="22" rx="6" fill="#fff"/><circle cx="12" cy="12" r="9" stroke="#0071e3" stroke-width="1.3" stroke-dasharray="3 1.5" fill="none"/><circle cx="12" cy="14" r="3.5" fill="#0071e3"/><circle cx="12" cy="14" r="1.3" fill="#fff"/><path d="M12 5v2M5 12h2M19 12h2" stroke="#0071e3" stroke-width="1.2" stroke-linecap="round"/></svg>',c:'#0071e3',n:'VIP Trip',d:'يدوي',on:'strips',ch:false},
    {id:'fuel',l:'<svg width="22" height="22" viewBox="0 0 24 24"><rect x="1" y="1" width="22" height="22" rx="6" fill="#fff"/><rect x="8" y="4" width="7" height="12" rx="2" fill="var(--yellow)"/><path d="M10 7h3v3h-3z" fill="#fff"/><path d="M16 9l2 3v3a1 1 0 001 1h.5a.5.5 0 00.5-.5v-3l-2-3" stroke="var(--yellow)" stroke-width="1.4" stroke-linecap="round" fill="none"/><rect x="10" y="12" width="3" height="2" rx=".5" fill="#fff"/></svg>',c:'var(--yellow)',n:'Fuel',d:'تموينة',on:'sfuel',ch:false},
    {id:'maint',l:'<svg width="22" height="22" viewBox="0 0 24 24"><rect x="1" y="1" width="22" height="22" rx="6" fill="#fff"/><circle cx="13" cy="13" r="5.5" stroke="#8e8e93" stroke-width="1.4" fill="none"/><path d="M16 6l2 2-3 3-2-2 3-3z" fill="#8e8e93"/><path d="M9 15l-3 3a1 1 0 01-1.4-1.4l3-3" stroke="#8e8e93" stroke-width="1.4"/></svg>',c:'#8e8e93',n:'Check Car',d:'تسجيل',on:'smaint',ch:false},
  ];
  g.innerHTML=btns.map(b=>{
    const click=b.on==='oc' ? "oc('"+b.id+"')" : b.on+"()";
    const cls=b.on==='oc' ? 'pb'+(b.ch?' connected':'') : 'pb q';
    const d=b.ch?'متصل':b.d;
    return '<div class="'+cls+'" onclick="'+click+'"><div class="pb-l" style="background:'+b.c+'">'+b.l+'</div><div class="pb-n">'+b.n+'</div><div class="pb-d" style="font-size:.55rem;color:var(--text-faint)">'+d+'</div></div>'
  }).join('');
}
document.addEventListener('DOMContentLoaded',ld);
</script>
{% endblock %}
